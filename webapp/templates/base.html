<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}rclone Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">⚡</div>
                <div>
                    <h1>rclone Manager</h1>
                    <small>sync any remote</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
                <a href="/sync" class="{% if active == 'sync' %}active{% endif %}">
                    <span class="nav-icon">🔄</span> Sync
                </a>
                <a href="/logs" class="{% if active == 'logs' %}active{% endif %}">
                    <span class="nav-icon">📋</span> Logs
                </a>
                <a href="/connection" class="{% if active == 'connection' %}active{% endif %}">
                    <span class="nav-icon">🔌</span> Connection
                </a>
            </nav>

            <div id="global-sync-indicator" class="global-sync-indicator" style="display:none"></div>

            <div class="sidebar-footer">
                <div style="color:var(--text-muted);font-size:11px">Powered by rclone</div>
            </div>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
