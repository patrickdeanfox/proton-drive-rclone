<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Proton Drive Sync{% endblock %}</title>
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">⬡</div>
      <div class="brand-text">
        <strong>Proton Drive</strong>
        <span>rclone sync</span>
      </div>
    </div>

    <nav>
      <a href="/"         class="nav-link {% if page=='home'     %}active{% endif %}">
        <svg viewBox="0 0 20 20"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" fill="none" stroke-width="1.5"/><path d="M7 18V12h6v6" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
        Dashboard
      </a>
      <a href="/browser"  class="nav-link {% if page=='browser'  %}active{% endif %}">
        <svg viewBox="0 0 20 20"><path d="M3 5a2 2 0 012-2h2l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V5z" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
        File Browser
      </a>
      <a href="/logs"     class="nav-link {% if page=='logs'     %}active{% endif %}">
        <svg viewBox="0 0 20 20"><path d="M4 4h12M4 8h12M4 12h8" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"/></svg>
        Logs
      </a>
      <a href="/settings" class="nav-link {% if page=='settings' %}active{% endif %}">
        <svg viewBox="0 0 20 20"><circle cx="10" cy="10" r="3" stroke="currentColor" fill="none" stroke-width="1.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusLabel">Checking…</span>
    </div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>

<div id="toast-area"></div>

<script>
async function refreshStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const dot = document.getElementById('statusDot');
    const lbl = document.getElementById('statusLabel');
    if (d.connected) {
      dot.className = 'status-dot connected';
      lbl.textContent = d.remote;
    } else {
      dot.className = 'status-dot error';
      lbl.textContent = 'Disconnected';
    }
  } catch {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusLabel').textContent = 'Offline';
  }
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-area').appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3500);
}

function fmtBytes(b) {
  if (!b && b !== 0) return '—';
  const units = ['B','KB','MB','GB','TB'];
  let i = 0;
  while (b >= 1024 && i < units.length - 1) { b /= 1024; i++; }
  return b.toFixed(i ? 1 : 0) + ' ' + units[i];
}

refreshStatus();
setInterval(refreshStatus, 30000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
