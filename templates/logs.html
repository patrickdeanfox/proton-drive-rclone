{% extends 'base.html' %}
{% set page = 'logs' %}
{% block title %}Logs — Proton Drive Sync{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Logs</h1>
  <button class="btn btn-ghost btn-sm" onclick="loadLogs()">↺ Refresh</button>
</div>

<div class="card" style="padding:0">
  <pre class="log-output full" id="logOutput">Loading…</pre>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadLogs() {
  const el = document.getElementById('logOutput');
  try {
    const r = await fetch('/api/logs');
    const d = await r.json();
    el.textContent = d.lines?.length ? d.lines.join('\n') : '(no log entries)';
    el.scrollTop = el.scrollHeight;
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}
loadLogs();
</script>
{% endblock %}
